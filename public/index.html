<!doctype html>
<html lang="en">
	<head>
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>report.w0s.jp</title>
		<style>
			:root {
				--anchor-hover-color: #d00;
			}

			:focus {
				outline: 1px solid #4d90fe;
			}

			:any-link {
				text-decoration-thickness: from-font;

				&:hover {
					color: var(--anchor-hover-color);
				}
			}

			body {
				box-sizing: border-box;
				margin-block: unset;
				margin-inline: auto;
				padding-inline: 2dvi;
				inline-size: min(100dvi, 1280px);
			}

			.link {
				& a {
					--bullet-size: 0.75em;
					--bullet-color: #0bb;

					outline-offset: 0.1em;

					&::before {
						display: inline flow-root;
						margin-inline-end: 0.5em;
						clip-path: polygon(0 0, 0 100%, 100% 50%);
						background-color: var(--bullet-color);
						block-size: var(--bullet-size);
						inline-size: calc(var(--bullet-size) * 0.6);
						content: '';
					}

					&:hover::before {
						--bullet-color: var(--anchor-hover-color);
					}
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>report.w0s.jp</h1>
		</header>

		<main>
			<p class="link"><a href="https://github.com/SaekiTominaga/report.w0s.jp">Source Code (GitHub)</a></p>
		</main>
	</body>
</html>
